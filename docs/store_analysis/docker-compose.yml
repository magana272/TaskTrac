services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 2s
      timeout: 3s
      retries: 5

  bench-json:
    build:
      context: ../..
      dockerfile: docs/store_analysis/Dockerfile
    environment:
      - BENCH_STORE=JSON
      - BENCH_SCALES=10,100,1000,2000,4000,10000,50000
      - BENCH_OUTPUT=/output
    mem_limit: 1g
    volumes:
      - bench-data:/output

  bench-duckdb:
    build:
      context: ../..
      dockerfile: docs/store_analysis/Dockerfile
    environment:
      - BENCH_STORE=DUCKDB
      - BENCH_SCALES=10,100,1000,2000,4000,10000,50000
      - BENCH_OUTPUT=/output
    mem_limit: 1g
    volumes:
      - bench-data:/output

  bench-parquet:
    build:
      context: ../..
      dockerfile: docs/store_analysis/Dockerfile
    environment:
      - BENCH_STORE=PARQUET
      - BENCH_SCALES=10,100,1000,2000,4000,10000
      - BENCH_OUTPUT=/output
    mem_limit: 1g
    volumes:
      - bench-data:/output

  bench-redis:
    build:
      context: ../..
      dockerfile: docs/store_analysis/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - BENCH_STORE=REDIS
      - BENCH_SCALES=10,100,1000,2000,4000,10000,50000
      - BENCH_OUTPUT=/output
      - REDIS_URL=redis://redis:6379
    mem_limit: 1g
    volumes:
      - bench-data:/output

  bench-mongo:
    build:
      context: ../..
      dockerfile: docs/store_analysis/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - BENCH_STORE=MONGO
      - BENCH_SCALES=10,100,1000,2000,4000,10000,50000
      - BENCH_OUTPUT=/output
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=trak_bench
    mem_limit: 1g
    volumes:
      - bench-data:/output

  analysis:
    image: r-base:4.4.1
    depends_on:
      bench-json:
        condition: service_completed_successfully
      bench-duckdb:
        condition: service_completed_successfully
      bench-parquet:
        condition: service_completed_successfully
      bench-redis:
        condition: service_completed_successfully
      bench-mongo:
        condition: service_completed_successfully
    volumes:
      - bench-data:/data
      - ./:/output
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq libcairo2-dev libxt-dev pkg-config > /dev/null 2>&1 &&
        Rscript -e 'install.packages(c(\"ggplot2\",\"dplyr\",\"scales\"), repos=\"https://cloud.r-project.org\", quiet=TRUE)' &&
        cd /data &&
        head -1 trial_data_json.csv > trial_data.csv &&
        for f in trial_data_*.csv; do tail -n +2 \"\$$f\" >> trial_data.csv; done &&
        head -1 results_json.csv > results.csv &&
        for f in results_*.csv; do tail -n +2 \"\$$f\" >> results.csv; done &&
        cp /output/analyze.R . &&
        Rscript analyze.R &&
        cp *.png *.csv system_specs.txt /output/ 2>/dev/null;
        echo 'Analysis complete'
      "

volumes:
  bench-data:
